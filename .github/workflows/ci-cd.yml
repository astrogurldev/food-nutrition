name: CI/CD Pipeline - Food Nutrition Analyzer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1: TEST
  # ============================================
  test:
    name: 🧪 Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python -m py_compile app/app.py
          python -m py_compile app/nutrition_data.py
          echo "✅ Syntax check passed!"

      - name: Check required files exist
        run: |
          test -f app/app.py && echo "✅ app.py exists"
          test -f app/nutrition_data.py && echo "✅ nutrition_data.py exists"
          test -f app/requirements.txt && echo "✅ requirements.txt exists"
          test -f docker/Dockerfile && echo "✅ Dockerfile exists"
          test -f k8s/deployment.yaml && echo "✅ deployment.yaml exists"
          test -f k8s/hpa.yaml && echo "✅ hpa.yaml exists"

  # ============================================
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # ============================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            astrogurldev/food-nutrition:latest
            astrogurldev/food-nutrition:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: DEPLOY KE HUGGINGFACE SPACES
  # ============================================
  deploy:
    name: 🚀 Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://astrogurldev:$HF_TOKEN@huggingface.co/spaces/astrogurldev/food-nutrition hf-space
          cp app/app.py hf-space/
          cp app/nutrition_data.py hf-space/
          cp app/requirements.txt hf-space/
          cp -r app/templates hf-space/
          cd hf-space
          git add .
          git diff --staged --quiet || git commit -m "auto-deploy from GitHub Actions 🚀"
          git push